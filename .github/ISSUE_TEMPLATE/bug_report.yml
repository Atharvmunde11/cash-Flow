name: Bug report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Settings
        2. Import BUSY file
        3. See error
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: How are you running CashFlow?
      options:
        - npm run dev (browser)
        - Electron desktop
        - Docker
        - Production build (npm start)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 x64
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste terminal output or describe UI state.
